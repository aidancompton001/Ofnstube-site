<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 84" role="img" aria-label="Ofnstube">
  <title>Ofnstube — Wortmarke mit Glut-Ring</title>
  <!-- Stage 2: Wortmarke vor Finalisierung in Kurven konvertieren (Anti-Fehler E) -->
  <defs>
    <radialGradient id="ofnCore1" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#ffe0b5"/>
      <stop offset="40%" stop-color="#ff8a40"/>
      <stop offset="100%" stop-color="#d9530f"/>
    </radialGradient>
  </defs>
  <text x="6" y="56" font-family="Fraunces, 'Times New Roman', Georgia, serif"
        font-size="50" font-weight="560" letter-spacing="-0.5" fill="#f5e6d3">Ofnstube</text>
  <g transform="translate(300 10)">
    <circle cx="32" cy="32" r="28" fill="none" stroke="#ff6b1a" stroke-width="3"
