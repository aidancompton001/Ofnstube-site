<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ofnstube Glut-Ring Bildmarke">
  <title>Ofnstube — Glut-Ring</title>
  <defs>
    <radialGradient id="ofnCore" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#ffe0b5"/>
      <stop offset="40%" stop-color="#ff8a40"/>
      <stop offset="100%" stop-color="#d9530f"/>
    </radialGradient>
  </defs>
  <!-- outer broken Glut-Ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ff6b1a" stroke-width="3"
          stroke-linecap="round" stroke-dasharray="120 56" transform="rotate(-128 32 32)"/>
  <!-- mid ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#ff8a40" stroke-width="2.4"
          stroke-linecap="round" stroke-dasharray="92 28" transform="rotate(64 32 32)" opacity="0.92"/>
  <!-- ember core -->
  <circle cx="32" cy="32" r="8.6" fill="url(#ofnCore)"/>
  <!-- rising spark -->
  <circle cx="32" cy="10.5" r="2.5" fill="#ff6b1a"/>
</svg>
